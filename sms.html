    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        const myIdDisplay = document.getElementById('my-id');
        const chatBox = document.getElementById('chat-box');
        const peerIdInput = document.getElementById('peer-id');
        const messageInput = document.getElementById('message-input');

        // 1. إنشاء اتصال Peer جديد
        const peer = new Peer(); 
        let connection;

        // عند الحصول على الـ ID الخاص بي من السيرفر
        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
        });

        // 2. استقبال اتصال من صديق
        peer.on('connection', (conn) => {
            connection = conn;
            setupChat();
            appendMessage("<b>system:</b> you are online");
        });

        // 3. وظيفة الاتصال بصديق
        function connectToPeer() {
            const id = peerIdInput.value;
            connection = peer.connect(id);
            setupChat();
            appendMessage("<b>system:</b> loading to call  " + id);
        }

        // إعداد استقبال الرسائل
        function setupChat() {
            connection.on('data', (data) => {
                appendMessage("<b>he/him:</b> " + data);
            });
        }

        // 4. وظيفة إرسال الرسائل
        function sendMessage() {
            const msg = messageInput.value;
            if (connection && connection.open) {
                connection.send(msg);
                appendMessage("<b>me:</b> " + msg);
                messageInput.value = "";
            } else {
                alert("call first");
            }
        }

        function appendMessage(text) {
            chatBox.innerHTML += "<p>" + text + "</p>";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
